name: ArXiv Daily Crawler

on:
  # 每天 UTC 时间 19:00 执行（即北京时间凌晨 03:00）
  schedule:
    - cron: '0 19 * * *'
  
  # 允许手动触发
  workflow_dispatch:
  
  # 推送到 main 分支时触发（可选）
  push:
    branches: [ main, master ]

jobs:
  fetch-arxiv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch arxiv papers
        env:
          PYTHONUNBUFFERED: 1
        run: |
          echo "开始爬取 ArXiv 论文..."
          echo "当前工作目录: $(pwd)"
          echo "Python 版本: $(python --version)"
          echo ""
          
          python -u scripts/fetch_arxiv.py
          
          echo ""
          echo "爬取完成！"
          
          if [ -d "jekyll/docs" ]; then
            echo "jekyll/docs 目录已创建"
            echo "文件数量: $(find jekyll/docs -name "*.md" | wc -l)"
            echo "目录结构:"
            find jekyll/docs -type f -name "*.md" | head -20
            echo ""
            echo "论文数量: $(grep -r "arxiv.org/abs" jekyll/docs/ | wc -l)"
          else
            echo "jekyll/docs 目录未创建"
          fi
        continue-on-error: false
      
      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有更改
          git add .
          
          # 显示将要提交的更改
          echo "将要提交的文件:"
          git status --short
          
          # 提交更改
          git commit -m "Update arxiv papers $(date +'%Y-%m-%d')" || exit 0
          
          # 推送到 GitHub
          git push
      
      - name: Create summary
        if: always()
        run: |
          echo "## ArXiv Paper Crawler Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "jekyll/docs" ]; then
            # 统计文件数量
            FILE_COUNT=$(find jekyll/docs -name "*.md" | wc -l)
            # 统计论文数量 - 查找包含 arxiv.org/abs 的行
            PAPER_COUNT=$(grep -r "arxiv.org/abs" jekyll/docs/ | wc -l)
            echo "✅ Successfully processed $FILE_COUNT files with $PAPER_COUNT papers" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No papers found or jekyll/docs directory not created" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Deploy to GitHub Pages
        if: success() && steps.git-check.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jekyll/
          publish_branch: gh-pages
          cname: ""
